# hyprland.conf
# By OldJobobo (https://github.com/OldJobobo)
# Legacy Hyprland theme include. hyprland.lua is the source of truth.
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.
$activeBorderColor = rgb(4a4036) rgb(a67a43) rgb(c29b67) rgb(4a4036) 42deg
$inactiveBorderColor = rgba(6f665fcc) rgba(4a403699) rgba(6f665fcc) 42deg
$activeShadowColor = rgba(00000099)
$inactiveShadowColor = rgba(00000055)

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    border_size = 2
    gaps_in = 6
    gaps_out = 12
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
}

decoration {
    rounding = 0
    dim_inactive = true
    dim_strength = 0.14
    active_opacity = 1.0
    inactive_opacity = 0.96

    blur {
        enabled = true
        size = 3
        passes = 2
        noise = 0.05
        contrast = 0.1
        vibrancy = 0.1
        vibrancy_darkness = 0.1
    }

    shadow {
        enabled = true
        range = 14
        render_power = 3
        offset = 2 3
        color = $activeShadowColor
        color_inactive = $inactiveShadowColor
    }
}

animations {
    enabled = yes
    bezier = noirEase, 0.24, 0.9, 0.2, 1.0

    animation = windows, 1, 4, noirEase
    animation = windowsIn, 1, 5, noirEase, popin 20%
    animation = windowsOut, 1, 4, noirEase, popin 75%
    animation = border, 1, 5, noirEase
    animation = fade, 1, 4, noirEase
    animation = fadeIn, 1, 4, noirEase
    animation = fadeOut, 1, 3, noirEase
    animation = layers, 1, 4, noirEase
    animation = layersIn, 1, 4, noirEase, fade
    animation = layersOut, 1, 3, noirEase, fade
    animation = fadeLayersIn, 1, 4, noirEase
    animation = fadeLayersOut, 1, 3, noirEase
    animation = workspaces, 1, 4, noirEase
    animation = specialWorkspace, 1, 4, noirEase, slidevert
}

