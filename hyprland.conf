# hyprland.conf
# By OldJobobo (https://github.com/OldJobobo)
# Legacy Hyprland theme include. hyprland.lua is the source of truth.
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.
$activeBorderColor = rgb(080706) rgb(96423c) rgb(c29b67) rgb(5a6674) rgb(080706) 135deg
$inactiveBorderColor = rgba(6f665f99) rgba(4a403655) rgba(080706cc) 135deg
$activeShadowColor = rgba(000000aa)
$inactiveShadowColor = rgba(00000055)

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    border_size = 3
    gaps_in = 7
    gaps_out = 22
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
}

decoration {
    rounding = 0
    dim_inactive = true
    dim_strength = 0.28
    active_opacity = 1.0
    inactive_opacity = 0.88

    blur {
        enabled = true
        size = 2
        passes = 1
        noise = 0.08
        contrast = 0.24
        vibrancy = 0.0
        vibrancy_darkness = 0.28
    }

    shadow {
        enabled = true
        range = 20
        render_power = 4
        offset = 6 8
        color = $activeShadowColor
        color_inactive = $inactiveShadowColor
    }
}

animations {
    enabled = yes
    bezier = noirCut, 0.18, 0.92, 0.16, 1.0
    bezier = noirDrift, 0.12, 0.72, 0.24, 1.0

    animation = windows, 1, 6, noirCut
    animation = windowsIn, 1, 7, noirCut, popin 8%
    animation = windowsOut, 1, 5, noirCut, popin 55%
    animation = border, 1, 7, noirCut
    animation = fade, 1, 5, noirCut
    animation = fadeIn, 1, 5, noirCut
    animation = fadeOut, 1, 4, noirCut
    animation = layers, 1, 5, noirCut
    animation = layersIn, 1, 5, noirCut, fade
    animation = layersOut, 1, 4, noirCut, fade
    animation = fadeLayersIn, 1, 5, noirCut
    animation = fadeLayersOut, 1, 4, noirCut
    animation = workspaces, 1, 5, noirDrift, slide
    animation = specialWorkspace, 1, 5, noirDrift, slidevert
}

