# Omarchy shell visual tokens for Noir.

[bar]
background       = "#080706"
background-alpha = 0.88
text             = "#9e9286"
active           = "#a5342f"
scale-with-font  = true
size-horizontal  = 28
size-vertical    = 30

[controls]
normal-color        = "#9e9286"
normal-fill-alpha   = 0.045
normal-border       = "rgb(080706) rgb(96423c) rgb(c29b67) rgb(5a6674) rgb(080706) 135deg"
normal-border-width = 1
normal-border-alpha = 0.18

hover-cursor-color        = "#c29b67"
hover-cursor-fill-alpha   = 0.10
hover-cursor-border       = "rgb(080706) rgb(96423c) rgb(c29b67) rgb(5a6674) rgb(080706) 135deg"
hover-cursor-border-width = 1
hover-cursor-border-alpha = 0.42

focus-color        = "#c29b67"
focus-fill-alpha   = 0.12
focus-border       = "rgb(080706) rgb(96423c) rgb(c29b67) rgb(5a6674) rgb(080706) 135deg"
focus-border-width = 1
focus-border-alpha = 0.62

selected-color        = "#a67a43"
selected-fill-alpha   = 0.18
selected-border       = "rgb(080706) rgb(96423c) rgb(c29b67) rgb(5a6674) rgb(080706) 135deg"
selected-border-width = 1
selected-border-alpha = 0.55

pressed-color        = "#c08b4a"
pressed-fill-alpha   = 0.24
selection-color      = "#a67a43"
selection-fill-alpha = 0.36

[spacing]
scale = 1.02
scale-with-font = true
control-gap = 8
control-padding-x = 11
control-padding-y = 6
input-padding-y = 7
control-height = 29
popup-row-height = 30
row-gap = 8
row-padding-x = 13
label-gap = 4
panel-gap = 15
panel-padding = 19
popup-padding = 15
dropdown-width = 246
searchable-dropdown-width = 266
number-field-width = 122
searchable-popup-min-height = 224

[font]
base-size = 12
caption = 10
body-small = 11
body = 12
subtitle = 13
title = 14
heading = 16
display = 24
display-large = 28
icon-small = 11
icon = 14
icon-large = 18

[popups]
background       = "#040302"
background-alpha = 0.94
text             = "#9e9286"
border           = "rgb(080706) rgb(96423c) rgb(c29b67) rgb(5a6674) rgb(080706) 135deg"
border-alpha     = 0.95

[tooltip]
background       = "#040302"
background-alpha = 0.96
text             = "#9e9286"
border           = "rgb(080706) rgb(96423c) rgb(c29b67) rgb(5a6674) rgb(080706) 135deg"
border-alpha     = 0.72

[notifications]
background       = "#040302"
background-alpha = 0.95
text             = "#9e9286"
border           = "rgb(080706) rgb(96423c) rgb(c29b67) rgb(5a6674) rgb(080706) 135deg"
border-alpha     = 0.90
countdown        = "#c08b4a"

[launcher]
background                = "#18130f"
background-alpha          = 0.94
text                      = "#9e9286"
border                    = "rgb(080706) rgb(96423c) rgb(c29b67) rgb(5a6674) rgb(080706) 135deg"
border-alpha              = 0.52
border-width              = 2
scrim                     = "#080706"
scrim-alpha               = 0.44
selected-background       = "rgb(96423c) rgb(c29b67) rgb(5a6674) 90deg"
selected-background-alpha = 0.09
selected-text             = "#f7f1ea"
selected-border           = "#6f665f"
selected-border-alpha     = 0.72
selected-border-width     = 0
selected-border-width-left = 4

[menu]
background                = "#18130f"
background-alpha          = 0.94
text                      = "#9e9286"
border                    = "rgb(080706) rgb(96423c) rgb(c29b67) rgb(5a6674) rgb(080706) 135deg"
border-alpha              = 0.52
border-width              = 2
scrim                     = "#080706"
scrim-alpha               = 0.44
selected-background       = "rgb(96423c) rgb(c29b67) rgb(5a6674) 90deg"
selected-background-alpha = 0.09
selected-text             = "#f7f1ea"
selected-border           = "#6f665f"
selected-border-alpha     = 0.72
selected-border-width     = 0
selected-border-width-left = 4

[polkit]
background       = "#040302"
background-alpha = 0.97
text             = "#9e9286"
text-error       = "#a5342f"
border           = "rgb(080706) rgb(96423c) rgb(c29b67) rgb(5a6674) rgb(080706) 135deg"
border-error     = "#a5342f"
border-alpha     = 0.96
scrim            = "#080706"
scrim-alpha      = 0.58
accent           = "#c08b4a"

[lock]
background       = "#040302"
background-alpha = 0.82
text             = "#9e9286"
placeholder      = "#8d8177"
text-error       = "#a5342f"
border           = "rgb(080706) rgb(96423c) rgb(c29b67) rgb(5a6674) rgb(080706) 135deg"
border-active    = "rgb(080706) rgb(96423c) rgb(c29b67) rgb(5a6674) rgb(080706) 135deg"
border-error     = "#a5342f"
border-alpha     = 0.95
selection        = "#a67a43"
selection-alpha  = 0.42

[image-picker]
scrim                   = "#080706"
scrim-alpha             = 0.58
text                    = "#9e9286"
selected-border         = "#c29b67"
selected-border-alpha   = 1.0
unselected-border       = "#8d8177"
unselected-border-alpha = 0.30
